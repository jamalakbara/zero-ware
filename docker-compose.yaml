version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: codeguide-starter-fullstack-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-zeroware}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --skip-password-validation
    networks:
      - codeguide-starter-fullstack-network

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codeguide-starter-fullstack-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=your-super-secret-key-change-in-production
      - BETTER_AUTH_URL=http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - mysql
    networks:
      - codeguide-starter-fullstack-network

  # Development database only
  mysql-dev:
    image: mysql:8.0
    container_name: codeguide-starter-fullstack-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-zeroware_dev}
    ports:
      - "3307:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --skip-password-validation
    networks:
      - codeguide-starter-fullstack-network
    profiles:
      - dev

volumes:
  mysql_data:
    driver: local
  mysql_dev_data:
    driver: local

networks:
  codeguide-starter-fullstack-network:
    driver: bridge